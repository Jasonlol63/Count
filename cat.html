<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Swipe App</title>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 420px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .card {
            position: absolute;
            width: 90%;
            height: 70%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            touch-action: none;
            transition: transform 0.3s ease;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .label {
            position: absolute;
            top: 20px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            opacity: 0;
        }

        .like {
            left: 20px;
            color: #2ecc71;
            border: 2px solid #2ecc71;
        }

        .dislike {
            right: 20px;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }

        #summary {
            padding: 20px;
            text-align: center;
            overflow-y: auto;
        }

        #summary img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #000;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    const TOTAL_CATS = 10;
    const app = document.getElementById("app");

    let cats = [];
    let likedCats = [];
    let currentIndex = 0;

    function createCatUrl() {
        return `https://cataas.com/cat?random=${Math.random()}`;
    }

    function loadCats() {
        for (let i = 0; i < TOTAL_CATS; i++) {
            cats.push(createCatUrl());
        }
        renderCard();
    }

    function renderCard() {
        if (currentIndex >= cats.length) {
            showSummary();
            return;
        }

        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = cats[currentIndex];

        const likeLabel = document.createElement("div");
        likeLabel.className = "label like";
        likeLabel.innerText = "LIKE";

        const dislikeLabel = document.createElement("div");
        dislikeLabel.className = "label dislike";
        dislikeLabel.innerText = "NOPE";

        card.append(img, likeLabel, dislikeLabel);
        app.appendChild(card);

        let startX = 0;
        let currentX = 0;

        card.addEventListener("pointerdown", e => {
            startX = e.clientX;
            card.setPointerCapture(e.pointerId);
        });

        card.addEventListener("pointermove", e => {
            currentX = e.clientX - startX;
            card.style.transform = `translateX(${currentX}px) rotate(${currentX / 20}deg)`;

            likeLabel.style.opacity = currentX > 0 ? Math.min(currentX / 100, 1) : 0;
            dislikeLabel.style.opacity = currentX < 0 ? Math.min(Math.abs(currentX) / 100, 1) : 0;
        });

        card.addEventListener("pointerup", () => {
            if (currentX > 120) {
                likedCats.push(cats[currentIndex]);
                swipe(card, 1);
            } else if (currentX < -120) {
                swipe(card, -1);
            } else {
                card.style.transform = "translateX(0)";
                likeLabel.style.opacity = 0;
                dislikeLabel.style.opacity = 0;
            }
        });
    }

    function swipe(card, direction) {
        card.style.transform = `translateX(${direction * 1000}px) rotate(${direction * 45}deg)`;
        setTimeout(() => {
            card.remove();
            currentIndex++;
            renderCard();
        }, 300);
    }

    function showSummary() {
        app.innerHTML = "";

        const summary = document.createElement("div");
        summary.id = "summary";

        summary.innerHTML = `
            <h2>You liked ${likedCats.length} cats 😺</h2>
            <button onclick="location.reload()">Restart</button>
            <br><br>
        `;

        likedCats.forEach(url => {
            const img = document.createElement("img");
            img.src = url;
            summary.appendChild(img);
        });

        app.appendChild(summary);
    }

    loadCats();
</script>

</body>
</html>
